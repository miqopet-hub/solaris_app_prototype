<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SOLARIS CCD iPhone Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    min-height: 100%;
    background: #000;
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  body {
    min-height: 100svh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .stage {
    width: min(94vw, 760px);
    height: min(100svh, 900px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: max(12px, env(safe-area-inset-top)) 12px max(96px, env(safe-area-inset-bottom));
  }
  .app {
    width: min(86vw, 68svh, 620px);
    height: min(86vw, 68svh, 620px);
    aspect-ratio: 1/1;
    position: relative;
    user-select: none;
    border-radius: 50%;
    overflow: hidden;
    border: 0;
    box-shadow: none;
    background: #000;
  }
  canvas { width:100%; height:100%; display:block; border-radius:50%; touch-action:none; }
  video { display:none; }
  .toolbar {
    position: fixed;
    left: 12px;
    right: 12px;
    bottom: max(10px, env(safe-area-inset-bottom));
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    z-index: 10;
  }
  button, label {
    background: rgba(255,255,255,.10);
    color: #fff;
    border: 1px solid rgba(255,255,255,.24);
    padding: 9px 12px;
    border-radius: 999px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    font-size: 13px;
    line-height: 1;
  }
  button:hover,label:hover { background:rgba(255,255,255,.18); }
  input[type=file] { display:none; }
  .hint {
    position: fixed;
    top: max(10px, env(safe-area-inset-top));
    left: 14px;
    right: 14px;
    text-align: center;
    color: rgba(255,255,255,.58);
    font-size: 12px;
    pointer-events: none;
    z-index: 10;
  }
  .effectStrip {
    width: 100%;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
    overflow: hidden;
    white-space: nowrap;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .effectName {
    color: rgba(255,255,255,.42);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    filter: blur(.6px);
    transform: scale(.92);
    opacity: .75;
    transition: transform 180ms cubic-bezier(.2,.8,.2,1), opacity 180ms cubic-bezier(.2,.8,.2,1), filter 180ms cubic-bezier(.2,.8,.2,1), color 180ms cubic-bezier(.2,.8,.2,1);
  }
  .effectName.selected {
    color: #fff;
    filter: blur(0);
    transform: scale(1.12);
    opacity: 1;
  }
  .effectName.far { opacity: .28; filter: blur(1.2px); }
  .effectName.hidden { display: none; }

  @media (max-width: 700px) {
    .stage {
      justify-content: center;
      gap: 12px;
      padding-bottom: max(118px, env(safe-area-inset-bottom));
    }
    .app {
      width: min(90vw, 58svh);
      height: min(90vw, 58svh);
    }
    .effectStrip { gap: 18px; min-height: 42px; }
    .effectName { font-size: 11px; }
    .toolbar { gap: 6px; }
    button, label { font-size: 11px; padding: 8px 9px; }
    .hint { font-size: 11px; }
  }
</style>
</head>

</div>

function textCenter(t,x,y,s,w='normal',col='#fff3cf',a=1){ctx.save();ctx.globalAlpha=a;ctx.fillStyle=col;ctx.font=`${w} ${s}px Arial,Helvetica,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,.95)';ctx.shadowBlur=12;ctx.shadowOffsetY=2;ctx.fillText(t,x,y);ctx.restore()}

let lastStripKey = "";

function getDialTextNames(){
  if(uiMode===0) return processes.map(p=>p.name);
  return (cp().params || []).map(p=>p.name);
}
function getDialTextSelected(){
  return uiMode===0 ? processIndex : paramIndex;
}
function buildEffectStrip(){
  const strip = document.getElementById('effectStrip');
  if(!strip) return;
  const names = getDialTextNames();
  const key = uiMode + ':' + names.join('|');
  if(key === lastStripKey) return;
  lastStripKey = key;
  strip.innerHTML = '';
  names.forEach((name, i)=>{
    const el = document.createElement('div');
    el.className = 'effectName';
    el.dataset.index = String(i);
    el.textContent = name;
    strip.appendChild(el);
  });
}
function updateDialTextLayer(){
  const strip = document.getElementById('effectStrip');
  if(!strip) return;
  buildEffectStrip();

  const names = getDialTextNames();
  const selected = getDialTextSelected();
  const n = names.length || 1;
  const items = strip.querySelectorAll('.effectName');

  items.forEach(el=>{
    const i = Number(el.dataset.index);
    let rel = i - selected;
    if(rel > n/2) rel -= n;
    if(rel < -n/2) rel += n;
    const dist = Math.abs(rel);

    el.classList.remove('selected','far','hidden');
    if(i === selected) el.classList.add('selected');
    else if(dist >= 3) el.classList.add('far');
    if(dist > 4) el.classList.add('hidden');
    el.style.order = String(100 + rel);
  });
}
function drawDialLabels(){ updateDialTextLayer(); }
function drawFrame(){
  if(liveMode && !frozen) updateLiveSource();
  ctx.clearRect(0,0,W,H);

  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);

  let img = processImage();
  ctx.save();
  ctx.beginPath();
  ctx.arc(C,C,imageDiameter/2,0,Math.PI*2);
  ctx.clip();
  ctx.drawImage(img,C-imageDiameter/2,C-imageDiameter/2);
  let edge=ctx.createRadialGradient(C,C,imageDiameter*.35,C,C,imageDiameter*.52);
  edge.addColorStop(0,'rgba(0,0,0,0)');
  edge.addColorStop(1,'rgba(0,0,0,.18)');
  ctx.fillStyle=edge;
  ctx.fillRect(C-imageDiameter/2,C-imageDiameter/2,imageDiameter,imageDiameter);
  ctx.restore();

  ctx.strokeStyle='rgba(255,255,255,.92)';
  ctx.lineWidth=5;
  ctx.beginPath();
  ctx.arc(C,C,imageDiameter/2+2,0,Math.PI*2);
  ctx.stroke();

  let now=performance.now();
  if(now<overlayUntil){
    let a=clamp((overlayUntil-now)/350,0,1),proc=cp(),par=cpar();
    ctx.save();
    ctx.globalAlpha=a;
    rr(C-115,C+imageDiameter/2-105,230,78,24);
    ctx.fillStyle='rgba(0,0,0,.58)';
    ctx.fill();
    ctx.restore();
    let top='PROCESS',main=proc.name,sub='';
    if(uiMode===1){top='PARAMETER';main=par.name;sub=proc.name}
    if(uiMode===2){top=par.name;main=String(Math.round(par.value));sub=proc.name}
    textCenter(top,C,C+imageDiameter/2-88,12,'normal','#ffffff',a*.75);
    textCenter(main,C,C+imageDiameter/2-62,24,'bold','#ffffff',a);
    if(sub)textCenter(sub,C,C+imageDiameter/2-38,12,'normal','#ffffff',a*.7);
  }

  updateDialTextLayer();
  if(liveMode&&!frozen)requestAnimationFrame(drawFrame);
  else if(now<overlayUntil)requestAnimationFrame(drawFrame);
}
function rotateDial(direction,step){if(uiMode===0){processIndex=(processIndex-direction+processes.length)%processes.length;paramIndex=0}else if(uiMode===1){let ps=cp().params;paramIndex=(paramIndex-direction+ps.length)%ps.length}else{cp().active=true;let par=cpar(),st=par.max===10?1:step;par.value=clamp(par.value+direction*st,par.min,par.max)}showOverlay();updateDialTextLayer();drawFrame()}
function centerPress(){
  if(uiMode===0){
    if(cp().random){
      mutateRecipe();
      return;
    }
    uiMode=1;
    paramIndex=0;
  }else if(uiMode===1){
    cp().active=true;
    uiMode=2;
  }else{
    cp().active=true;
    uiMode=1;
  }
  showOverlay(1100);
  updateDialTextLayer();
  drawFrame();
}
function backToEffects(){
  uiMode=0;
  updateDialTextLayer();
  showOverlay(900);
  drawFrame();
}
function resetCurrentParameter(){
  if(uiMode===2){
    let par=cpar();
    par.value=par.def;
    showOverlay(1000);
    drawFrame();
  }else if(uiMode===1){
    backToEffects();
  }else{
    resetAllParameters();
  }
}
function resetAllParameters(){
  processes.forEach(p=>{
    p.active=false;
    if(p.params)p.params.forEach(par=>par.value=par.def);
  });
  grainSeed=12345;
  noiseSeed=67890;
  uiMode=0;
  updateDialTextLayer();
  showOverlay(1200);
  drawFrame();
}
function mutateRecipe(){
  // Fresh procedural recipe each click.
  processes.forEach(p=>{
    p.active=false;
    if(p.params)p.params.forEach(par=>par.value=par.def);
  });

  let real=processes.filter(p=>!p.random);
  let changes=2+Math.floor(Math.random()*4);

  for(let c=0;c<changes;c++){
    let p=real[Math.floor(Math.random()*real.length)];
    p.active=true;
    let edits=1+(Math.random()<.35?1:0);

    for(let e=0;e<edits;e++){
      let par=p.params[Math.floor(Math.random()*p.params.length)];
      let range=par.max-par.min;
      if(range<=10){
        par.value=Math.floor(Math.random()*(par.max-par.min+1))+par.min;
      }else{
        let v=35+Math.random()*55;
        if(Math.random()<.18)v=Math.random()*100;
        par.value=clamp(Math.round(v/5)*5,par.min,par.max);
      }
    }
  }

  grainSeed=Math.floor(Math.random()*2000000000)+1;
  noiseSeed=Math.floor(Math.random()*2000000000)+1;
  uiMode=0;
  updateDialTextLayer();
  showOverlay(1100);
  drawFrame();
}
function startMutation(){if(mutateTimer)return;mutateRecipe();mutateTimer=setInterval(mutateRecipe,170)}function stopMutation(){if(holdTimer){clearTimeout(holdTimer);holdTimer=null}if(mutateTimer){clearInterval(mutateTimer);mutateTimer=null}}


function getSupportedRecordMime(){
  if(!window.MediaRecorder) return '';
  const types=['video/mp4;codecs=h264','video/mp4','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
  for(const t of types){
    try{ if(MediaRecorder.isTypeSupported(t)) return t; }catch(e){}
  }
  return '';
}
function startRecordLoop(){
  if(recordLoop) return;
  const tick=()=>{
    if(mediaRecorder && mediaRecorder.state==='recording'){
      if(!liveMode || frozen) drawFrame();
      recordLoop=requestAnimationFrame(tick);
    }else{
      recordLoop=null;
    }
  };
  recordLoop=requestAnimationFrame(tick);
}
function startRecording(){
  if(!canvas.captureStream || !window.MediaRecorder){
    alert('Video recording is not supported in this browser. On iPhone, use Safari 14.5+ or try updating iOS.');
    return;
  }
  recordedChunks=[];
  const stream=canvas.captureStream(30);
  const mimeType=getSupportedRecordMime();
  try{
    mediaRecorder=new MediaRecorder(stream, mimeType ? {mimeType} : undefined);
  }catch(err){
    alert('Recording failed to start on this browser.');
    return;
  }
  mediaRecorder.ondataavailable=e=>{ if(e.data && e.data.size>0) recordedChunks.push(e.data); };
  mediaRecorder.onstop=()=>{
    const type=mediaRecorder.mimeType || mimeType || 'video/mp4';
    const blob=new Blob(recordedChunks,{type});
    const ext=type.includes('mp4') ? 'mp4' : 'webm';
    const link=document.createElement('a');
    link.download=`solaris_recording.${ext}`;
    link.href=URL.createObjectURL(blob);
    document.body.appendChild(link);
    link.click();
    link.remove();
    setTimeout(()=>URL.revokeObjectURL(link.href),1200);
    document.getElementById('recordBtn').textContent='Record';
  };
  mediaRecorder.start();
  document.getElementById('recordBtn').textContent='Stop Rec';
  startRecordLoop();
}
function stopRecording(){
  if(mediaRecorder && mediaRecorder.state==='recording') mediaRecorder.stop();
}
function toggleRecording(){
  if(mediaRecorder && mediaRecorder.state==='recording') stopRecording();
  else startRecording();
}

let touchDialActive=false;
let touchLastAngle=0;
let touchAccum=0;
let touchMoved=false;

function angleFromPoint(clientX, clientY){
  let r=canvas.getBoundingClientRect();
  let x=(clientX-r.left)/r.width*W-C;
  let y=(clientY-r.top)/r.height*H-C;
  return Math.atan2(y,x);
}
function signedAngleDelta(a,b){
  let d=a-b;
  while(d>Math.PI)d-=Math.PI*2;
  while(d<-Math.PI)d+=Math.PI*2;
  return d;
}
function isInsideCanvasCircle(clientX, clientY){
  let r=canvas.getBoundingClientRect();
  let x=(clientX-r.left)/r.width*W;
  let y=(clientY-r.top)/r.height*H;
  return Math.hypot(x-C,y-C)<imageDiameter/2;
}

// Touch/drag dial for phone.
// Drag around the circle clockwise/counterclockwise.
// Small angular movement = 1 step, fast/bigger movement = repeated steps.
canvas.addEventListener('pointerdown',e=>{
  if(e.pointerType==='mouse')return;
  canvas.setPointerCapture(e.pointerId);
  touchDialActive=true;
  touchMoved=false;
  touchLastAngle=angleFromPoint(e.clientX,e.clientY);
  touchAccum=0;

  let r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*W,y=(e.clientY-r.top)/r.height*H;
  if(Math.hypot(x-C,y-C)<imageDiameter/2){
    holdTimer=setTimeout(()=>{suppressClick=true;resetCurrentParameter()},520);
  }
});

canvas.addEventListener('pointermove',e=>{
  if(!touchDialActive || e.pointerType==='mouse')return;
  e.preventDefault();

  let a=angleFromPoint(e.clientX,e.clientY);
  let d=signedAngleDelta(a,touchLastAngle);
  touchLastAngle=a;
  touchAccum+=d;

  let browseMode = uiMode===0 || uiMode===1;
  let threshold = browseMode ? 0.255 : 0.055;
  let fastThreshold = browseMode ? 0.52 : 0.14;

  if(Math.abs(touchAccum)>threshold){
    touchMoved=true;
    if(holdTimer){clearTimeout(holdTimer);holdTimer=null}
    let dir=touchAccum>0?-1:1;
    let step=Math.abs(touchAccum)>fastThreshold?5:1;
    rotateDial(dir,step);
    touchAccum=0;
  }
},{passive:false});

canvas.addEventListener('pointerup',e=>{
  if(e.pointerType==='mouse')return;
  touchDialActive=false;
  if(holdTimer){clearTimeout(holdTimer);holdTimer=null}
  stopMutation();
  if(touchMoved){
    suppressClick=true;
    setTimeout(()=>suppressClick=false,80);
  }
});

canvas.addEventListener('pointercancel',e=>{
  touchDialActive=false;
  if(holdTimer){clearTimeout(holdTimer);holdTimer=null}
  stopMutation();
});

let stripDragActive=false;
let stripLastX=0;
let stripAccum=0;
const effectStrip=document.getElementById('effectStrip');
effectStrip.addEventListener('pointerdown',e=>{
  stripDragActive=true;
  stripLastX=e.clientX;
  stripAccum=0;
  effectStrip.setPointerCapture(e.pointerId);
});
effectStrip.addEventListener('pointermove',e=>{
  if(!stripDragActive) return;
  e.preventDefault();
  let dx=e.clientX-stripLastX;
  stripLastX=e.clientX;
  stripAccum+=dx;
  let threshold=(uiMode===2)?26:52;
  if(Math.abs(stripAccum)>threshold){
    rotateDial(stripAccum>0?1:-1,1);
    stripAccum=0;
  }
},{passive:false});
effectStrip.addEventListener('pointerup',()=>{stripDragActive=false;stripAccum=0;});
effectStrip.addEventListener('pointercancel',()=>{stripDragActive=false;stripAccum=0;});

  let r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*W,y=(e.clientY-r.top)/r.height*H;
  if(Math.hypot(x-C,y-C)<imageDiameter/2){
    holdTimer=setTimeout(()=>{suppressClick=true;resetCurrentParameter()},520);
  }
});
window.addEventListener('mouseup',()=>{stopMutation()});canvas.addEventListener('click',e=>{if(suppressClick){suppressClick=false;return}let r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*W,y=(e.clientY-r.top)/r.height*H;if(Math.hypot(x-C,y-C)<imageDiameter/2)centerPress()});document.getElementById('modeBtn').onclick=centerPress;document.getElementById('mutateBtn').onclick=mutateRecipe;document.getElementById('backBtn').onclick=backToEffects;document.getElementById('resetBtn').onclick=()=>{let p=cpar();p.value=p.def;showOverlay(1000);drawFrame()};document.getElementById('saveBtn').onclick=()=>{let im=processImage(),out=document.createElement('canvas');out.width=out.height=imageDiameter;let ox=out.getContext('2d');ox.save();ox.beginPath();ox.arc(imageDiameter/2,imageDiameter/2,imageDiameter/2,0,Math.PI*2);ox.clip();ox.drawImage(im,0,0);ox.restore();let link=document.createElement('a');link.download=`solaris_${cp().name.toLowerCase()}.png`;link.href=out.toDataURL('image/png');link.click()};document.getElementById('captureBtn').onclick=()=>{if(liveMode){updateLiveSource();frozen=!frozen;document.getElementById('captureBtn').textContent=frozen?'Resume Live':'Freeze';showOverlay(900);drawFrame()}};document.getElementById('recordBtn').onclick=toggleRecording;document.getElementById('cameraBtn').onclick=async()=>{try{if(!liveMode){liveStream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},facingMode:'environment'},audio:false});video.srcObject=liveStream;liveMode=true;frozen=false;document.getElementById('cameraBtn').textContent='Stop Camera';document.getElementById('captureBtn').textContent='Freeze';showOverlay(1100);drawFrame()}else{liveStream?.getTracks().forEach(t=>t.stop());liveStream=null;liveMode=false;frozen=false;document.getElementById('cameraBtn').textContent='Start Camera';document.getElementById('captureBtn').textContent='Freeze';showOverlay(900);drawFrame()}}catch(err){alert('Camera access failed. Try Chrome/Firefox, or run from localhost if your browser blocks webcam access on local files.')}};fileInput.addEventListener('change',()=>{let file=fileInput.files[0];if(!file)return;if(liveMode){liveStream?.getTracks().forEach(t=>t.stop());liveStream=null;liveMode=false;frozen=false;document.getElementById('cameraBtn').textContent='Start Camera';document.getElementById('captureBtn').textContent='Freeze'}let img=new Image();img.onload=()=>{sourceCanvas.width=img.width;sourceCanvas.height=img.height;sourceCtx.drawImage(img,0,0);showOverlay(900);drawFrame()};img.src=URL.createObjectURL(file)});document.addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();centerPress()}if(e.key==='Escape'||e.key==='Backspace'){e.preventDefault();backToEffects()}if(e.key.toLowerCase()==='o')fileInput.click();if(e.key.toLowerCase()==='r'){resetCurrentParameter()}if(e.key.toLowerCase()==='s')document.getElementById('saveBtn').click();if(e.key.toLowerCase()==='m')mutateRecipe()});createDefaultImage();
updateDialTextLayer();showOverlay(900);drawFrame();
</script>
