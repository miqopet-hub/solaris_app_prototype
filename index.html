<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FK17 OKO ESP-P4 Fidelity Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#030303;color:#f3d88c;font-family:Arial,Helvetica,sans-serif;touch-action:none;-webkit-user-select:none;user-select:none}
body{display:grid;place-items:center}
#screen{width:min(100vmin,900px);height:min(100vmin,900px);display:block;touch-action:none;cursor:pointer}
#video{display:none}
.hint{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;text-align:center;color:rgba(240,210,140,.66);font-size:12px;letter-spacing:.04em;pointer-events:none;text-shadow:0 2px 10px #000}
.toolbar{position:fixed;left:10px;right:10px;bottom:max(10px,env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}
button,label,select{background:rgba(14,12,8,.72);color:#f3d88c;border:1px solid rgba(218,166,75,.34);border-radius:999px;padding:8px 11px;font-size:12px;backdrop-filter:blur(8px);cursor:pointer}
input[type=file]{display:none}
.badge{position:fixed;right:12px;top:max(36px,calc(env(safe-area-inset-top) + 28px));font-size:11px;color:rgba(240,210,140,.72);background:rgba(0,0,0,.45);border:1px solid rgba(218,166,75,.25);border-radius:999px;padding:7px 10px;pointer-events:none}
@media(max-width:700px){#screen{width:104vmin;height:104vmin;transform:translateY(-16px)}.toolbar{gap:5px}button,label,select{font-size:11px;padding:7px 9px}.hint{font-size:11px}}
</style>
</head>

</div>

function randomRecipe(){

  const count=Math.min(3,1+Math.floor(Math.random()*3));

  for(let i=0;i<count;i++){
    const available=real.filter(p=>!stack.some(s=>s.name===p.name));
    if(!available.length) break;

    const source=available[Math.floor(Math.random()*available.length)];
    const proc=cloneProcess(source);

    proc.params.forEach(p=>{
      if(p.max===10){
        p.value=Math.floor(Math.random()*(p.max-p.min+1))+p.min;
      }else{
        let lo=18, hi=72;

function effectHalftoneExport(base,e,outSize,logicalGrid){

  const minRad=cell*.035;

    row++;

      const ry=(gx-center)*sa+(gy-center)*ca+center;

function getRecordingMimeType(){
  // MediaRecorder support is browser-dependent.
  // We record with the best available codec, then convert to MP4 on stop when needed.
  const types=[
    'video/mp4;codecs=h264',
    'video/mp4;codecs=avc1.42E01E',
    'video/mp4',
    'video/webm;codecs=vp9',
    'video/webm;codecs=vp8',
    'video/webm'
  ];
  for(const t of types){
    if(window.MediaRecorder && MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

function loadScriptOnce(src){
  return new Promise((resolve,reject)=>{
    const existing=[...document.scripts].find(s=>s.src===src);
    if(existing){
      if(existing.dataset.loaded==='true') resolve();
      else existing.addEventListener('load',()=>resolve(),{once:true});
      return;
    }
    const s=document.createElement('script');
    s.src=src;
    s.async=true;
    s.onload=()=>{s.dataset.loaded='true';resolve()};
    s.onerror=()=>reject(new Error('Could not load '+src));
    document.head.appendChild(s);
  });
}
let ffmpegInstance=null;
async function convertBlobToMP4(inputBlob){
  triggerFeedback('LOADING MP4 ENGINE');

  await loadScriptOnce('https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js');
  await loadScriptOnce('https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js');

  const { FFmpeg } = window.FFmpegWASM;
  const { toBlobURL, fetchFile } = window.FFmpegUtil;

  if(!ffmpegInstance){
    ffmpegInstance=new FFmpeg();
    ffmpegInstance.on('progress',({progress})=>{
      const pct=Math.round((progress||0)*100);
      feedbackMsg=`MP4 ${pct}%`;
      feedbackUntil=performance.now()+500;
    });

    const baseURL='https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
    await ffmpegInstance.load({
      coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`,'text/javascript'),
      wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`,'application/wasm')
    });
  }

  await ffmpegInstance.writeFile('input.webm', await fetchFile(inputBlob));
  await ffmpegInstance.exec([
    '-i','input.webm',
    '-an',
    '-vf','scale=720:720:flags=lanczos,format=yuv420p',
    '-r','24',
    '-c:v','libx264',
    '-profile:v','baseline',
    '-level','3.1',
    '-pix_fmt','yuv420p',
    '-movflags','+faststart',
    '-preset','veryfast',
    'output.mp4'
  ]);
  const data=await ffmpegInstance.readFile('output.mp4');
  await ffmpegInstance.deleteFile('input.webm').catch(()=>{});
  await ffmpegInstance.deleteFile('output.mp4').catch(()=>{});
  return new Blob([data.buffer],{type:'video/mp4'});
}

function toggleRecording(){
  const btn=document.getElementById('recordBtn');

  if(convertingVideo){
    triggerFeedback('WAIT MP4');
    return;
  }

  if(recording){
    try{
      convertingVideo=true;
      btn.textContent='Converting...';
      triggerFeedback('CONVERTING');
      if(recorder && recorder.state!=='inactive') recorder.stop();
    }catch(e){
      console.error(e);
      convertingVideo=false;
      btn.textContent='Rec';
    }
    recording=false;
    return;
  }

  if(!recordCanvas.captureStream || !window.MediaRecorder){
    alert('Video recording is not supported in this browser. Try Chrome or Edge.');
    return;
  }

  drawRecordingFrame();
  recordedChunks=[];
  const stream=recordCanvas.captureStream(24);
  const mimeType=getRecordingMimeType();

  try{
    recorder=new MediaRecorder(stream,mimeType?{mimeType, videoBitsPerSecond:4500000}:{videoBitsPerSecond:4500000});
  }catch(err){
    alert('Could not start recording in this browser.');
    return;
  }

  recorder.ondataavailable=e=>{
    if(e.data && e.data.size>0) recordedChunks.push(e.data);
  };

  recorder.onstop=async()=>{
    const ext=extensionFromMimeType(mimeType);
    const rawBlob=new Blob(recordedChunks,{type:mimeType || 'video/webm'});

    try{
      if(ext==='mp4'){
        downloadBlob(rawBlob,`fk17_oko_gallery_${Date.now()}.mp4`);
        triggerFeedback('MP4 SAVED');
      }else{
        triggerFeedback('MP4 CONVERTING');
        const mp4Blob=await convertBlobToMP4(rawBlob);
        downloadBlob(mp4Blob,`fk17_oko_gallery_${Date.now()}.mp4`);
        triggerFeedback('MP4 SAVED');
      }
    }catch(err){
      console.error(err);
      // Do not silently fail. Export the raw recording so Stop always produces a file.
      downloadBlob(rawBlob,`fk17_oko_gallery_fallback_${Date.now()}.webm`);
      alert('MP4 conversion failed here, so the raw WebM recording was saved instead. For a video that saves directly to phone gallery, use Safari on iPhone or Chrome/Edge with internet access and allow the MP4 converter to load.');
    }finally{
      convertingVideo=false;
      btn.textContent='Rec';
      recordedChunks=[];
    }
  };

  recorder.start(250);
  recording=true;
  recordStart=performance.now();
  btn.textContent='Stop';
  triggerFeedback(extensionFromMimeType(mimeType)==='mp4'?'REC MP4':'REC → MP4');
}

    textCenter(uiMode==='value'?'ROTATE VALUE · TAP APPLY':'ROTATE PARAM · HOLD CANCEL',C,C+42,11,'normal','rgba(235,205,125,.70)');
  }

  // Stack indicator: 3 slots, each effect can exist only once.
  const y=C+screenR-14;
  const x0=C-52;
  for(let i=0;i<3;i++){
    const x=x0+i*52;
    ctx.save();
    ctx.beginPath();
    ctx.arc(x,y,12,0,Math.PI*2);
    ctx.strokeStyle='rgba(220,180,70,.48)';
    ctx.lineWidth=1.4;
    ctx.stroke();
    if(stack[i]){
      ctx.fillStyle='rgba(220,180,70,.76)';
      ctx.fill();
      ctx.font='bold 8px Arial,Helvetica,sans-serif';
      ctx.fillStyle='#100b05';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(stack[i].name.replace('/RGB','').slice(0,2),x,y+0.5);
    }
    ctx.restore();
  }
  const editingExisting=uiMode==='effects' && findStackIndex(cp().name)>=0;
  const stackLabel=stack.length>=3?'MAX 3':`STACK ${stack.length}/3`;
  textCenter(`${stackLabel}${editingExisting?' · EDIT':''}`,C,y+28,11,'bold',stack.length>=3?'#ffce70':'rgba(220,180,70,.55)');
}

function drawFrame(){
  if(liveMode&&!frozen)updateLiveSource();
  const now=performance.now();
  dialRotation+=(targetDialRot-dialRotation)*.15;
  ctx.clearRect(0,0,W,H);
  drawFK17Background();
  drawOKOTitle();

  let shakeX=0;
  if(now<shakeUntil){
    const t=(shakeUntil-now)/360;
    shakeX=Math.sin(now*.12)*12*t;
  }

  ctx.save();
  ctx.translate(shakeX,0);
  drawOuterBody();
  drawRotatingDial();
  drawScreen();
  drawTicks();
  drawLabels();
  drawHoldProgress(now);
  drawFeedback(now);
  drawRecordingIndicator(now);
  if(recording) drawRecordingFrame();
  ctx.restore();

  if(now-lastFpsUpdate>180){
    document.getElementById('perf').textContent=`ESP ${P}${simulateRGB565?' · RGB565':''} · ${lastFrameMS.toFixed(1)} ms`;
    lastFpsUpdate=now
  }
  requestAnimationFrame(drawFrame);
}
function rotateDial(direction,step=1){
  if(uiMode==='effects'){
    processIndex=(processIndex-direction+processes.length)%processes.length;
    paramIndex=0;
    draft=null;
    targetDialRot-=direction*(Math.PI*2/processes.length);
  }
  else if(uiMode==='params'){
    const ps=cp().params;
    paramIndex=(paramIndex-direction+ps.length)%ps.length;
    targetDialRot-=direction*.18;
  }
  else{
    const p=currentParamFromDraft();
    const st=p.max===10 ? 1 : step;
    p.value=clamp(p.value+direction*st,p.min,p.max);
    targetDialRot+=direction*.055;
  }
  showOverlay();
}
function centerPress(){
  if(uiMode==='effects'){
    if(cp().name==='RANDOM'){
      randomRecipe();
      return;
    }
    draft=getEditableEffect(cp());
    paramIndex=0;
    uiMode='params';
  }
  else if(uiMode==='params'){
    uiMode='value';
  }
  else{
    if(!upsertDraftToStack()) return;
    uiMode='params';
  }
  showOverlay(900);
}
function longPress(){
  if(uiMode==='effects'){
    stack=[];
    draft=null;
    uiMode='effects';
    resetFlashUntil=performance.now()+820;
    try{ if(navigator.vibrate) navigator.vibrate([45,35,45]); }catch(e){}
  }else{
    draft=null;
    uiMode='effects';
    triggerFeedback('CANCELLED');
  }
  stopHoldVisual();
  showOverlay(1100);
}
function resetAll(){
  stack=[];
  draft=null;
  uiMode='effects';
  processIndex=0;
  paramIndex=0;
  grainSeed=12345;
  noiseSeed=67890;
  resetFlashUntil=performance.now()+820;
  showOverlay(1100);
}
function angleFromPoint(clientX,clientY){const r=canvas.getBoundingClientRect();const x=(clientX-r.left)/r.width*W-C,y=(clientY-r.top)/r.height*H-C;return Math.atan2(y,x)}
function signedAngleDelta(a,b){let d=a-b;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return d}
let touchActive=false,lastAngle=0,accum=0,moved=false;
canvas.addEventListener('pointerdown',e=>{canvas.setPointerCapture(e.pointerId);touchActive=true;moved=false;lastAngle=angleFromPoint(e.clientX,e.clientY);accum=0;startHoldVisual();holdTimer=setTimeout(()=>{suppressClick=true;longPress()},holdDuration)});
canvas.addEventListener('pointermove',e=>{if(!touchActive)return;e.preventDefault();const a=angleFromPoint(e.clientX,e.clientY),d=signedAngleDelta(a,lastAngle);lastAngle=a;accum+=d;const browse=uiMode==='effects'||uiMode==='params';const threshold=browse ? .24 : .105;const fast=browse ? .52 : .26;const veryFast=browse ? .86 : .50;if(Math.abs(accum)>threshold){moved=true;if(holdTimer){clearTimeout(holdTimer);holdTimer=null}stopHoldVisual();const dir=accum>0?-1:1;const mag=Math.abs(accum);const step=mag>veryFast?10:(mag>fast?5:1);rotateDial(dir,step);accum=0}},{passive:false});
canvas.addEventListener('pointerup',()=>{touchActive=false;if(holdTimer){clearTimeout(holdTimer);holdTimer=null}stopHoldVisual();if(moved){suppressClick=true;setTimeout(()=>suppressClick=false,90)}else if(!suppressClick)centerPress();suppressClick=false});
canvas.addEventListener('wheel',e=>{e.preventDefault();wheelAccum+=e.deltaY;const browse=uiMode==='effects'||uiMode==='params';const threshold=browse?120:55;if(Math.abs(wheelAccum)<threshold)return;const dir=wheelAccum<0?1:-1;const mag=Math.abs(wheelAccum);const step=mag>260?10:(mag>150?5:1);wheelAccum=0;rotateDial(dir,step)},{passive:false});
document.getElementById('resSel').onchange=e=>{P=Number(e.target.value);showOverlay(900)};
document.getElementById('rgb565Btn').onclick=e=>{simulateRGB565=!simulateRGB565;e.target.textContent=simulateRGB565?'RGB565 ON':'RGB565 OFF';showOverlay(900)};
document.getElementById('resetBtn').onclick=resetAll;
document.getElementById('saveBtn').onclick=saveHighResolutionCirclePNG;
document.getElementById('recordBtn').onclick=toggleRecording;
document.getElementById('freezeBtn').onclick=()=>{if(liveMode){updateLiveSource();frozen=!frozen;showOverlay(900)}};
async function startCamera(){
  try{
    liveStream?.getTracks().forEach(t=>t.stop());
    liveStream=await navigator.mediaDevices.getUserMedia({
      video:{width:{ideal:1280},height:{ideal:720},facingMode:{ideal:cameraFacing}},
      audio:false
    });
    video.srcObject=liveStream;
    liveMode=true;
    frozen=false;
    document.getElementById('frontCamBtn').textContent=cameraFacing==='user'?'Back Cam':'Front Cam';
    showOverlay(1100);
  }catch(err){
    alert('Camera failed. Use HTTPS/localhost or mobile browser permissions.');
  }
}
document.getElementById('cameraBtn').onclick=async()=>{
  if(!liveMode){
    await startCamera();
  }else{
    liveStream?.getTracks().forEach(t=>t.stop());
    liveStream=null;
    liveMode=false;
    frozen=false;
    showOverlay(900);
  }
};
document.getElementById('frontCamBtn').onclick=async()=>{
  cameraFacing = cameraFacing==='user' ? 'environment' : 'user';
  document.getElementById('frontCamBtn').textContent=cameraFacing==='user'?'Back Cam':'Front Cam';
  if(liveMode) await startCamera();
  else triggerFeedback(cameraFacing==='user'?'FRONT CAMERA':'BACK CAMERA');
};
fileInput.addEventListener('change',()=>{const file=fileInput.files[0];if(!file)return;if(liveMode){liveStream?.getTracks().forEach(t=>t.stop());liveStream=null;liveMode=false;frozen=false}const img=new Image();img.onload=()=>{sourceCanvas.width=img.width;sourceCanvas.height=img.height;sourceCtx.drawImage(img,0,0);showOverlay(900);URL.revokeObjectURL(img.src)};img.src=URL.createObjectURL(file)});
document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();centerPress()}if(e.key==='Escape'||e.key==='Backspace'){e.preventDefault();longPress()}if(e.key.toLowerCase()==='r')resetAll();if(e.key.toLowerCase()==='o')fileInput.click()});
createDefaultImage();drawFrame();
</script>
</body>
